    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        .popup-box { text-align: center; font-family: Arial, sans-serif; direction: rtl; }
        .popup-img { width: 220px; height: auto; border-radius: 5px; margin-top: 5px; border: 1px solid #ccc; }

            // كود العرض الذكي لتفادي مشاكل الحروف الكبيرة والصغيرة في الامتداد تلقائياً
            var popupContent = `
                <div class="popup-box">

                    <img class="popup-img" src="images/${pt.photo}.jpg" onerror="this.src='images/${pt.photo}.JPG'; this.onerror=function(){this.src='images/${pt.photo}.png';};">

            `;
            
            marker.bindPopup(popupContent);
